<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEFLIX — Acesso Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ─── TOKENS ─────────────────────────────────────────── */
        :root {
            --red:        #e50914;
            --red-glow:   rgba(229, 9, 20, 0.55);
            --red-dim:    rgba(229, 9, 20, 0.15);
            --black:      #000000;
            --surface:    #0d0d0d;
            --border:     rgba(255,255,255,0.07);
            --text:       #ffffff;
            --muted:      rgba(255,255,255,0.45);
            --progress-h: 4px;

            /* ── EDIT THESE TWO VALUES ── */
            --youtube-id:  "ASzOzrB-a9E";          /* ← Cole o ID do vídeo aqui   */
            --redirect-url: "http://www.gameflixoficial.com.br/"; /* ← Cole o link de destino   */
            /* ─────────────────────────── */

            --cta-time-ms: 283000; /* 4 min 43 s em milissegundos */
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--black);
            font-family: 'Barlow', sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }

        /* ─── GRAIN OVERLAY ──────────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ─── LAYOUT ─────────────────────────────────────────── */
        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 48px 16px 120px;
        }

        /* ─── LOGO ───────────────────────────────────────────── */
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.12em;
            color: var(--red);
            margin-bottom: 36px;
            text-shadow: 0 0 24px var(--red-glow);
        }

        /* ─── HEADLINE ───────────────────────────────────────── */
        .headline {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 6vw, 3.6rem);
            line-height: 1.05;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            text-align: center;
            max-width: 780px;
            margin-bottom: 40px;
        }
        .headline em {
            font-style: normal;
            color: var(--red);
            text-shadow: 0 0 32px var(--red-glow);
        }

        /* ─── VIDEO CARD ─────────────────────────────────────── */
        .video-card {
            width: 100%;
            max-width: 820px;
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 8px 60px rgba(0,0,0,0.8),
                0 0 80px var(--red-dim);
            overflow: hidden;
            position: relative;
        }

        /* Aspect-ratio wrapper for the player */
        .video-ratio {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
        }
        .video-ratio #player {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Invisible interaction blocker — prevents pause/seek clicks reaching YouTube */
        .video-blocker {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
        }

        /* ─── CLICK-TO-PLAY OVERLAY ──────────────────────────── */
        .overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            background: rgba(0,0,0,0.82);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }

        .overlay-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-icon 1.8s ease-in-out infinite;
        }
        .overlay-icon svg { width: 28px; height: 28px; fill: #fff; margin-left: 4px; }
        .overlay-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: var(--red);
            padding: 10px 28px;
            border-radius: 4px;
            animation: pulse-btn 1.8s ease-in-out infinite;
        }

        /* ─── PROGRESS BAR ───────────────────────────────────── */
        .progress-track {
            width: 100%;
            height: var(--progress-h);
            background: rgba(255,255,255,0.1);
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #c40812, var(--red) 60%, #ff4444);
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 10px var(--red);
            transition: width 0.5s linear;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -1px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 6px var(--red);
        }

        /* Progress label row */
        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px 14px;
        }
        .progress-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .progress-pct {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            color: var(--red);
        }

        /* ─── CTA BUTTON ─────────────────────────────────────── */
        #cta-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 16px 28px;
            background: linear-gradient(to top, rgba(0,0,0,0.98) 60%, transparent);
            display: flex;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #cta-wrap.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 18px 48px;
            max-width: 500px;
            width: 100%;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #c40812 0%, #e50914 50%, #ff2a2a 100%);
            border-radius: 6px;
            border: none;
            cursor: pointer;
            box-shadow:
                0 0 0 2px rgba(229,9,20,0.3),
                0 0 40px rgba(229,9,20,0.5),
                0 4px 24px rgba(0,0,0,0.6);
            animation: float-cta 2.4s ease-in-out infinite;
        }
        .cta-btn svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }
        .cta-btn:hover { box-shadow: 0 0 0 2px rgba(229,9,20,0.6), 0 0 60px rgba(229,9,20,0.7), 0 4px 24px rgba(0,0,0,0.6); }

        /* ─── ANIMATIONS ─────────────────────────────────────── */
        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%       { transform: scale(1.08); opacity: 0.85; }
        }
        @keyframes pulse-btn {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 rgba(229,9,20,0); }
            50%       { transform: scale(1.03); box-shadow: 0 0 18px rgba(229,9,20,0.6); }
        }
        @keyframes float-cta {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-6px); }
        }

        /* ─── MOBILE ─────────────────────────────────────────── */
        @media (max-width: 600px) {
            .page { padding: 28px 8px 110px; }
            .logo { font-size: 1.6rem; margin-bottom: 22px; }
            .video-card { border-radius: 6px; }
            .cta-btn { font-size: 1.1rem; padding: 16px 24px; }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- Logo -->
    

    <!-- Headline -->
    <h1 class="headline">
        Assista o vídeo para<br>ter acesso à <em>Gameflix</em>
    </h1>

    <!-- Video Card -->
    <div class="video-card">

        <!-- Player -->
        <div class="video-ratio">
            <div id="player"></div>
            <!-- Blocks all native YouTube clicks (pause, seek, info cards, etc.) -->
            <div class="video-blocker" id="blocker"></div>
        </div>

        <!-- Click-to-play overlay -->
        <div class="overlay" id="overlay" onclick="startVideo()">
            <div class="overlay-icon">
                <!-- Speaker / audio icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/>
                </svg>
            </div>
            <div class="overlay-label">Clique para assistir com áudio</div>
        </div>

        <!-- Progress bar -->
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-meta">
            <span class="progress-label">Carregando acesso…</span>
            <span class="progress-pct" id="progressPct">0%</span>
        </div>

    </div><!-- /.video-card -->

</div><!-- /.page -->

<!-- CTA — appears at 4:43 -->
<div id="cta-wrap">
    <!--
        ┌──────────────────────────────────────────────────────────┐
        │  INSIRA o link de destino no atributo href abaixo:       │
        │  <a href="SEU_LINK_AQUI" ...>                            │
        └──────────────────────────────────────────────────────────┘
    -->
    <a href="http://www.gameflixoficial.com.br/" class="cta-btn" id="ctaBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5v14l11-7z"/>
        </svg>
        Acessar a Gameflix agora
    </a>
</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
    /* ═══════════════════════════════════════════════════════════
       CONFIGURAÇÃO  — edite apenas estas duas constantes
       ═══════════════════════════════════════════════════════════ */
    const VIDEO_ID    = 'GKO_KUaSxaY';          // ← ID do vídeo do YouTube
    const REDIRECT    = 'http://www.gameflixoficial.com.br/'; // ← URL de destino
    const CTA_SECOND  = 283;                     // 4 min 43 s  (não altere)
    /* ═══════════════════════════════════════════════════════════ */

    let player;
    let progressInterval = null;
    let ctaTimer         = null;
    let started          = false;

    /* ── YouTube Player ready ── */
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width:  '100%',
            videoId: VIDEO_ID,
            playerVars: {
                autoplay:        1,
                mute:            1,
                controls:        0,   // hide native controls
                disablekb:       1,   // disable keyboard shortcuts
                rel:             0,
                modestbranding:  1,
                iv_load_policy:  3,   // hide annotations
                fs:              0,   // no fullscreen button
                playsinline:     1,
            },
            events: {
                onReady:       onPlayerReady,
                onStateChange: onPlayerStateChange,
            }
        });
    }

    function onPlayerReady(e) {
        /* Video is muted + auto-playing in background; overlay is shown */
    }

    function onPlayerStateChange(e) {
        /* Keep playing if paused externally */
        if (e.data === YT.PlayerState.PAUSED && started) {
            setTimeout(() => { try { player.playVideo(); } catch(_){} }, 200);
        }
    }

    /* ── User clicks overlay → unmute & start experience ── */
    function startVideo() {
        if (started) return;
        started = true;

        const overlay = document.getElementById('overlay');
        overlay.classList.add('hidden');

        try {
            player.unMute();
            player.seekTo(0, true);
            player.playVideo();
        } catch(err) { console.warn('Player not ready yet', err); }

        startFakeProgress();
        scheduleCTA();
    }

    /* ── Fake progress bar ──────────────────────────────────────
       Easing: fast at the start, slows toward 95%.
       Formula: progress = 95 * (1 - e^(-k*t)) capped at 95.
       CTA reveal forces it to 100 when the button appears.
    ─────────────────────────────────────────────────────────── */
    const TOTAL_DURATION = 340;   // slightly longer than CTA_SECOND for natural feel
    const K              = 0.012; // decay constant — lower = slower saturation

    function easeProgress(elapsed) {
        const raw = 95 * (1 - Math.exp(-K * elapsed));
        return Math.min(raw, 95);
    }

    let elapsedSec = 0;

    function startFakeProgress() {
        progressInterval = setInterval(() => {
            elapsedSec += 0.5;
            const pct = easeProgress(elapsedSec);
            setProgressUI(pct);
        }, 500);
    }

    function setProgressUI(pct) {
        const fill = document.getElementById('progressFill');
        const label = document.getElementById('progressPct');
        if (fill)  fill.style.width = pct.toFixed(1) + '%';
        if (label) label.textContent = Math.round(pct) + '%';
    }

    /* ── Schedule the CTA button ── */
    function scheduleCTA() {
        ctaTimer = setTimeout(showCTA, CTA_SECOND * 1000);
    }

    function showCTA() {
        /* Snap progress to 100% */
        clearInterval(progressInterval);
        setProgressUI(100);
        document.querySelector('.progress-label').textContent = 'Acesso liberado!';

        /* Reveal CTA */
        document.getElementById('cta-wrap').classList.add('visible');

        /* Update link with the redirect URL */
        document.getElementById('ctaBtn').href = REDIRECT;
    }

    /* ── Prevent right-click context menu on the video area ── */
    document.addEventListener('contextmenu', e => {
        if (e.target.closest('.video-card')) e.preventDefault();
    });

    /* ── Prevent keyboard shortcuts that might trigger YouTube ── */
    document.addEventListener('keydown', e => {
        const blocked = [' ', 'k', 'K', 'ArrowLeft', 'ArrowRight', 'j', 'J', 'l', 'L', 'f', 'F', 'm', 'M'];
        if (blocked.includes(e.key)) e.preventDefault();
    });
</script>
</body>
</html>
